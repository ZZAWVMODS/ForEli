<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>I Love You 💗</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 2000px;
            position: relative;
        }

        /* Contenedor principal para centrar todo */
        .main-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* --- TU CORAZÓN ORIGINAL (Sin cambios de inclinación) --- */
        .scene {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(15deg); /* Inclinación fija que te gustó */
            margin-bottom: 40px;
        }

        .word-item {
            position: absolute;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .love-word {
            position: absolute;
            color: #ea80b0;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            /* Brillo neón potente restaurado */
            text-shadow: 
                0 0 8px #fff,
                0 0 20px #ff2d75,
                0 0 40px #ff2d75;
            white-space: nowrap;
            letter-spacing: 2px;
            transform: translate(-50%, -50%) rotateZ(-20deg);
        }

        /* --- NUEVO TEXTO DE CUMPLEAÑOS CON EFECTO SUTIL (ELEGANTE") --- */
        .birthday-message {
            position: relative;
            text-align: center;
            z-index: 20;
            margin-top: 30px;
            animation: gentleFloat 3s ease-in-out infinite;
            pointer-events: none;
        }

        .birthday-message .main-text {
            font-family: 'Courier New', 'Monaco', monospace;
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff99cc, #ff6699, #ff3366);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255, 51, 102, 0.5);
            letter-spacing: 3px;
            margin: 0;
            padding: 0;
            white-space: nowrap;
        }

        .birthday-message .sub-text {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            color: #ff99bb;
            text-shadow: 0 0 8px #ff2d75, 0 0 12px rgba(255, 45, 117, 0.6);
            margin-top: 8px;
            letter-spacing: 2px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Efecto de brillo suave alrededor del texto */
        .birthday-message::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -20px;
            right: -20px;
            bottom: -10px;
            background: radial-gradient(circle, rgba(255,51,102,0.2) 0%, rgba(0,0,0,0) 80%);
            border-radius: 50%;
            filter: blur(8px);
            z-index: -1;
            animation: pulseGlow 2.5s ease-in-out infinite;
        }

        /* Animación flotante suave */
        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        /* Pulso de brillo en el fondo del texto */
        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 0.8; transform: scale(1.05); }
            100% { opacity: 0.4; transform: scale(0.95); }
        }

        /* Pequeñas partículas decorativas alrededor del texto (como polvo sutil) */
        .text-sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .text-sparkle {
            position: absolute;
            background-color: #ff88aa;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0;
            animation: sparkleDrift 4s infinite ease-in-out;
        }

        @keyframes sparkleDrift {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            20% { opacity: 0.6; transform: scale(1); }
            80% { opacity: 0.3; transform: scale(0.8) translateY(-15px); }
            100% { opacity: 0; transform: scale(0) translateY(-30px); }
        }

        /* --- EL DESTELLO/POLVO EN LA PARTE INFERIOR DE LA PANTALLA --- */
        #dust-layer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            bottom: -10px;
            background-color: #ff2d75;
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0;
            animation: rise 6s infinite linear;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            15% { opacity: 0.6; }
            50% { opacity: 0.3; }
            /* Se desvanece antes de llegar a la mitad de la pantalla */
            100% { transform: translateY(-40vh) scale(0.2); opacity: 0; }
        }

        /* Responsive: ajustar tamaño del texto en móviles */
        @media (max-width: 768px) {
            .birthday-message .main-text {
                font-size: 1.5rem;
                white-space: nowrap;
            }
            .birthday-message .sub-text {
                font-size: 1rem;
            }
            .love-word {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="scene" id="heart"></div>
        
        <!-- NUEVO: TEXTO DE CUMPLEAÑOS CON EFECTO ELEGANTE -->
        <div class="birthday-message" id="birthdayText">
            <div class="main-text">✨ Feliz cumpleaños Eli ✨</div>
            <div class="sub-text">💖 Te quiero mucho 💖</div>
            <!-- Partículas sutiles alrededor del texto -->
            <div class="text-sparkles" id="textSparkles"></div>
        </div>
    </div>
    
    <div id="dust-layer"></div>

    <script>
        const container = document.getElementById('heart');
        const dustLayer = document.getElementById('dust-layer');
        const TOTAL_WORDS = 65; 
        const SCALE = 19;
        const words = [];

        // 1. Restaurar las letras fluyendo en cadena
        for (let i = 0; i < TOTAL_WORDS; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'word-item';
            const span = document.createElement('span');
            span.className = 'love-word';
            span.innerText = 'I love you';
            wrapper.appendChild(span);
            container.appendChild(wrapper);
            words.push({ element: wrapper, offset: i / TOTAL_WORDS });
        }

        // 2. Crear las partículas de polvo sutiles abajo
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}%`;
            p.style.animationDuration = `${Math.random() * 4 + 4}s`;
            p.style.animationDelay = `${Math.random() * 5}s`;
            dustLayer.appendChild(p);
        }
        
        // ========== AGREGAR PARTÍCULAS SUTILES ALREDEDOR DEL TEXTO DE CUMPLEAÑOS ==========
        function createTextSparkles() {
            const sparklesContainer = document.getElementById('textSparkles');
            if (!sparklesContainer) return;
            
            // Crear 25 pequeñas chispas alrededor del área del texto
            for (let i = 0; i < 30; i++) {
                const spark = document.createElement('div');
                spark.className = 'text-sparkle';
                const size = Math.random() * 5 + 2;
                spark.style.width = `${size}px`;
                spark.style.height = `${size}px`;
                spark.style.left = `${Math.random() * 100}%`;
                spark.style.top = `${Math.random() * 100}%`;
                spark.style.animationDelay = `${Math.random() * 5}s`;
                spark.style.animationDuration = `${Math.random() * 3 + 2}s`;
                spark.style.backgroundColor = `rgb(255, ${80 + Math.random() * 100}, ${120 + Math.random() * 100})`;
                sparklesContainer.appendChild(spark);
            }
            
            // Regenerar chispas periódicamente para mantener el efecto vivo
            setInterval(() => {
                if (sparklesContainer.children.length < 20) {
                    const newSpark = document.createElement('div');
                    newSpark.className = 'text-sparkle';
                    const size = Math.random() * 5 + 2;
                    newSpark.style.width = `${size}px`;
                    newSpark.style.height = `${size}px`;
                    newSpark.style.left = `${Math.random() * 100}%`;
                    newSpark.style.top = `${Math.random() * 100}%`;
                    newSpark.style.backgroundColor = `rgb(255, ${80 + Math.random() * 100}, ${120 + Math.random() * 100})`;
                    newSpark.style.animation = `sparkleDrift ${Math.random() * 3 + 2}s ease-in-out infinite`;
                    sparklesContainer.appendChild(newSpark);
                    setTimeout(() => newSpark.remove(), 5000);
                }
            }, 3000);
        }
        
        createTextSparkles();

        // ========== FUNCIONES AGREGADAS (SIN MODIFICAR NADA DE LO ANTERIOR) ==========
        
        // 1. REPRODUCIR CANCIÓN
        const audio = new Audio('https://d.uguu.se/DydFscnc.mp3');
        audio.loop = true;
        audio.volume = 0.8;
        
        // Intentar reproducir automáticamente (los navegadores requieren interacción)
        const playAudio = () => {
            audio.play().catch(e => console.log("Autoplay bloqueado, haz clic en la pantalla"));
            document.removeEventListener('click', playAudio);
            document.removeEventListener('touchstart', playAudio);
        };
        
        document.addEventListener('click', playAudio);
        document.addEventListener('touchstart', playAudio);
        
        // También intentar reproducción automática silenciosa
        audio.play().catch(() => console.log("Esperando interacción del usuario"));
        
        // 2. FONDO GRADIENTE QUE CAMBIA CON LA MÚSICA (USANDO Web Audio API)
        let audioContext = null;
        let source = null;
        let analyser = null;
        let gradientAnimation = null;
        
        function initAudioVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                source = audioContext.createMediaElementSource(audio);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                function updateGradient() {
                    if (audioContext && analyser && audioContext.state === 'running') {
                        analyser.getByteFrequencyData(dataArray);
                        // Obtener intensidad de la música
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) {
                            sum += dataArray[i];
                        }
                        let intensity = sum / (dataArray.length * 255);
                        intensity = Math.min(0.8, Math.max(0.15, intensity * 1.2));
                        
                        // Cambiar gradiente según intensidad
                        const r = 30 + Math.floor(100 * intensity);
                        const g = 10 + Math.floor(50 * intensity);
                        const b = 20 + Math.floor(80 * intensity);
                        document.body.style.background = `radial-gradient(circle at 50% 30%, rgb(${r}, ${g}, ${b}), #000000)`;
                        document.body.style.transition = 'background 0.1s ease';
                    }
                    requestAnimationFrame(updateGradient);
                }
                
                updateGradient();
            } catch(e) {
                console.log("Audio visualizer no soportado", e);
                // Fallback: gradiente que cambia con el tiempo
                let fallbackIntensity = 0;
                setInterval(() => {
                    fallbackIntensity = 0.2 + Math.sin(Date.now() / 500) * 0.1;
                    const r = 30 + Math.floor(100 * fallbackIntensity);
                    const g = 10 + Math.floor(50 * fallbackIntensity);
                    const b = 20 + Math.floor(80 * fallbackIntensity);
                    document.body.style.background = `radial-gradient(circle at 50% 30%, rgb(${r}, ${g}, ${b}), #000000)`;
                }, 200);
            }
        }
        
        // Iniciar visualizador cuando el audio esté listo
        audio.addEventListener('play', () => {
            if (!audioContext) {
                initAudioVisualizer();
            }
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });
        
        // 3. MEJORAR DESTELLOS/POLVO (más partículas que suben desde abajo)
        function addExtraSparkles() {
            setInterval(() => {
                // Crear destellos extra cuando hay música
                const extraCount = 5 + Math.floor(Math.random() * 8);
                for (let i = 0; i < extraCount; i++) {
                    const spark = document.createElement('div');
                    spark.style.position = 'absolute';
                    spark.style.bottom = '-5px';
                    spark.style.width = `${Math.random() * 5 + 2}px`;
                    spark.style.height = `${Math.random() * 5 + 2}px`;
                    spark.style.backgroundColor = `rgb(255, ${100 + Math.random() * 100}, ${150 + Math.random() * 105})`;
                    spark.style.borderRadius = '50%';
                    spark.style.filter = `blur(${Math.random() * 2}px)`;
                    spark.style.left = `${Math.random() * 100}%`;
                    spark.style.opacity = '0.8';
                    spark.style.pointerEvents = 'none';
                    spark.style.zIndex = '0';
                    spark.style.animation = 'rise 3s ease-out forwards';
                    dustLayer.appendChild(spark);
                    
                    setTimeout(() => spark.remove(), 3000);
                }
            }, 800);
        }
        
        // Iniciar destellos extra
        addExtraSparkles();
        
        // Añadir keyframe para las chispas extra si no existe
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes rise {
                0% { transform: translateY(0) scale(1); opacity: 0.8; }
                100% { transform: translateY(-50vh) scale(0.2); opacity: 0; }
            }
        `;
        document.head.appendChild(styleSheet);
        
        // ========== ANIMACIÓN ORIGINAL (SIN MODIFICAR) ==========
        let time = 0;
        function animate() {
            time += 0.002;
            
            words.forEach((word) => {
                const t = ((word.offset + time) % 1) * 2 * Math.PI;
                
                // Geometría del corazón que funcionaba bien
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const z = (7 * Math.sin(t * 1.8) + 3 * Math.cos(t * 3)) * 3;
                
                const angleY = (t * 180 / Math.PI) + 90;
                
                // Aplicación optimizada
                word.element.style.transform = `translate3d(${x * SCALE}px, ${-y * SCALE}px, ${z}px) rotateY(${angleY}deg)`;
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Botón opcional para controlar música
        const controlBtn = document.createElement('div');
        controlBtn.innerHTML = '🎵';
        controlBtn.style.position = 'fixed';
        controlBtn.style.bottom = '20px';
        controlBtn.style.right = '20px';
        controlBtn.style.width = '45px';
        controlBtn.style.height = '45px';
        controlBtn.style.borderRadius = '50%';
        controlBtn.style.backgroundColor = 'rgba(0,0,0,0.6)';
        controlBtn.style.color = '#ff6699';
        controlBtn.style.fontSize = '24px';
        controlBtn.style.display = 'flex';
        controlBtn.style.alignItems = 'center';
        controlBtn.style.justifyContent = 'center';
        controlBtn.style.cursor = 'pointer';
        controlBtn.style.zIndex = '1000';
        controlBtn.style.backdropFilter = 'blur(5px)';
        controlBtn.style.border = '1px solid #ff6699';
        controlBtn.style.fontFamily = 'monospace';
        document.body.appendChild(controlBtn);
        
        let isPlaying = false;
        controlBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                controlBtn.innerHTML = '🎵';
                controlBtn.style.boxShadow = '0 0 10px #ff6699';
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            } else {
                audio.pause();
                controlBtn.innerHTML = '⏸️';
                controlBtn.style.boxShadow = 'none';
            }
        });
        
        audio.addEventListener('play', () => {
            isPlaying = true;
            controlBtn.innerHTML = '🎵';
        });
        
        audio.addEventListener('pause', () => {
            isPlaying = false;
            controlBtn.innerHTML = '⏸️';
        });
        
        // Efecto extra: hacer que el texto de cumpleaños brille en sincronía con la música (sutil)
        if (audioContext) {
            let lastBeat = 0;
            const beatDetector = setInterval(() => {
                if (analyser && audioContext && audioContext.state === 'running') {
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(dataArray);
                    let lowFreqSum = 0;
                    for (let i = 0; i < 10; i++) {
                        lowFreqSum += dataArray[i];
                    }
                    const beatIntensity = lowFreqSum / (10 * 255);
                    if (beatIntensity > 0.6) {
                        const birthdayDiv = document.querySelector('.birthday-message');
                        if (birthdayDiv) {
                            birthdayDiv.style.transform = 'scale(1.02)';
                            setTimeout(() => {
                                if (birthdayDiv) birthdayDiv.style.transform = 'scale(1)';
                            }, 150);
                        }
                    }
                }
            }, 300);
        }
        
        console.log('❤️ Código original respetado + Texto de cumpleaños elegante añadido ❤️');
        
        // Ajuste para asegurar que el texto siempre esté visible y centrado con el corazón
        window.addEventListener('resize', () => {
            const containerRect = container.getBoundingClientRect();
            const msgRect = document.querySelector('.birthday-message')?.getBoundingClientRect();
            // Solo para mantener coherencia visual, no se fuerza posición para no interferir
        });
    </script>
</body>
</html>
